<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>M-Metric 标注 — 指标判得对不对</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

  :root {
    /* Palette borrowed from siyuan.lu/slides — parchment + ink */
    --parchment:        #f4ede4;
    --parchment-light:  #faf6f0;
    --parchment-dark:   #ebe2d4;
    --ink-blue:         #2b4c6f;
    --ink-blue-light:   #3d6a96;
    --ink-blue-faint:   rgba(43,76,111,0.08);
    --charcoal:         #2d2a26;
    --warm-gray:        #6b6460;
    --warm-gray-light:  #9e9590;
    --accent-red:       #8b3a3a;
    --accent-red-bg:    rgba(139,58,58,0.10);
    --accent-gold:      #a68a56;
    --accent-gold-bg:   rgba(166,138,86,0.12);
    --accent-green:     #4a6b3a;
    --accent-green-bg:  rgba(74,107,58,0.12);
    --rule-color:       rgba(43,76,111,0.18);

    /* Functional aliases (kept stable for the old class names) */
    --bg:        var(--parchment);
    --panel:     var(--parchment-light);
    --card:      var(--parchment-dark);
    --border:    var(--rule-color);
    --text:      var(--charcoal);
    --muted:     var(--warm-gray);
    --accent:    var(--ink-blue);
    --good:      var(--accent-green);
    --bad:       var(--accent-red);
    --warn:      var(--accent-gold);
    --neutral:   var(--ink-blue-light);

    --font-cn:   'Noto Serif SC', 'Songti SC', 'Source Han Serif SC', serif;
    --font-en:   Charter, 'Bitstream Charter', 'Georgia', 'Noto Serif SC', serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: var(--font-en), var(--font-cn);
         background:var(--parchment); color:var(--charcoal); line-height:1.6; font-size:14px;
         -webkit-font-smoothing: antialiased; }

  /* Top bar — ink on parchment, hairline rule under */
  .topbar { background:var(--parchment-light);
            border-bottom:1px solid var(--rule-color);
            padding:14px 28px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
            position:sticky; top:0; z-index:100; }
  .topbar h1 { font-family: var(--font-cn); font-size:17px; font-weight:700;
               color:var(--ink-blue); letter-spacing:0.02em; }
  .metric-tabs { display:flex; gap:2px; border:1px solid var(--rule-color); border-radius:4px;
                 background:var(--parchment); padding:2px; }
  .metric-tab { padding:6px 14px; background:transparent; border:none;
                border-radius:3px; cursor:pointer; font-size:13px; font-weight:600;
                color:var(--warm-gray); font-family: var(--font-en); letter-spacing:0.03em; }
  .metric-tab:hover { color:var(--ink-blue); }
  .metric-tab.active { background:var(--ink-blue); color:var(--parchment-light); }
  .metric-tab .count { font-size:11px; opacity:0.75; margin-left:5px; font-weight:400; }
  .progress { color:var(--warm-gray); font-size:12.5px; font-family: var(--font-en); }
  .progress strong { color:var(--charcoal); font-weight:600; }
  .actions { margin-left:auto; display:flex; gap:6px; }
  .btn { padding:6px 13px; background:var(--parchment); border:1px solid var(--rule-color);
         border-radius:3px; cursor:pointer; color:var(--ink-blue); font-size:12px; font-weight:600;
         font-family: var(--font-en); letter-spacing:0.02em; transition:all 0.15s; }
  .btn:hover { background:var(--ink-blue); color:var(--parchment-light); border-color:var(--ink-blue); }

  /* Layout */
  .layout { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 60px); }
  .sidebar { background:var(--parchment-light); border-right:1px solid var(--rule-color);
             overflow-y:auto; max-height:calc(100vh - 60px); }
  .sidebar-item { padding:11px 16px; border-bottom:1px solid var(--rule-color);
                  cursor:pointer; font-size:12.5px; transition:background 0.12s;
                  position:relative; }
  .sidebar-item:hover { background:var(--ink-blue-faint); }
  .sidebar-item.active { background:var(--ink-blue); color:var(--parchment-light); }
  .sidebar-item.active .si-id,
  .sidebar-item.active .si-meta { color:rgba(255,255,255,0.75); }
  .sidebar-item .si-id { font-family:var(--font-mono); font-size:10.5px; color:var(--warm-gray-light); letter-spacing:0.05em; }
  .sidebar-item .si-title { font-weight:600; margin:3px 0; word-break:break-all;
                            font-family:var(--font-mono); font-size:11.5px; line-height:1.4; }
  .sidebar-item .si-meta { font-size:10.5px; color:var(--warm-gray); }
  .sidebar-item .si-status { float:right; padding:1px 7px; border-radius:2px; font-size:10px; font-weight:700;
                              font-family:var(--font-cn); letter-spacing:0.05em; }
  .sidebar-item .si-status.true_pos { background:var(--accent-green); color:var(--parchment-light); }
  .sidebar-item .si-status.false_pos { background:var(--accent-red); color:var(--parchment-light); }
  .sidebar-item .si-status.unsure { background:var(--accent-gold); color:var(--parchment-light); }
  .sidebar-item .si-status.skipped { background:var(--warm-gray-light); color:var(--parchment-light); }

  .main { padding:30px 36px; overflow-y:auto; max-height:calc(100vh - 60px); background:var(--parchment); }
  .header-row { display:flex; align-items:start; gap:16px; margin-bottom:20px; flex-wrap:wrap;
                padding-bottom:16px; border-bottom:1px solid var(--rule-color); }
  .header-row h2 { font-size:14px; font-weight:600; word-break:break-all;
                   font-family:var(--font-mono); flex:1; min-width:280px;
                   color:var(--ink-blue); letter-spacing:0; line-height:1.5; }
  .meta-pills { display:flex; flex-wrap:wrap; gap:5px; }
  .pill { padding:3px 10px; background:var(--parchment-light); border:1px solid var(--rule-color);
          border-radius:2px; font-size:11px; color:var(--warm-gray); font-family:var(--font-en);
          letter-spacing:0.02em; }
  .pill strong { color:var(--ink-blue); font-weight:600; }
  .pill.score { background:var(--accent-green-bg); border-color:var(--accent-green); color:var(--accent-green); }
  .pill.score strong { color:var(--accent-green); }
  .pill.bad { background:var(--accent-red-bg); border-color:var(--accent-red); color:var(--accent-red); }

  /* The question card — like a margin annotation, not a neon panel */
  .question-card {
    background: var(--parchment-light);
    border: 1px solid var(--rule-color);
    border-left: 3px solid var(--ink-blue);
    border-radius: 2px; padding: 18px 24px; margin-bottom: 18px;
  }
  .question-card .q-label { font-size:10.5px; font-weight:700; color:var(--ink-blue);
                            text-transform:uppercase; letter-spacing:0.12em; margin-bottom:8px;
                            font-family:var(--font-en); }
  .question-card .q-text { font-size:14px; line-height:1.75; color:var(--charcoal);
                           font-family:var(--font-cn); }
  .question-card .q-text code { background:var(--ink-blue-faint); padding:1px 6px;
                                 border-radius:2px; font-size:12px; font-family:var(--font-mono);
                                 color:var(--ink-blue); }
  .question-card .q-text strong { color:var(--ink-blue); font-weight:700; }

  .label-buttons { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .label-btn { padding:11px 22px; border-radius:2px; font-size:13.5px; font-weight:600;
               border:1.5px solid; cursor:pointer; min-width:140px;
               font-family:var(--font-cn); letter-spacing:0.04em; transition:all 0.15s; }
  .label-btn.true_pos { background:var(--accent-green-bg); border-color:var(--accent-green); color:var(--accent-green); }
  .label-btn.false_pos { background:var(--accent-red-bg); border-color:var(--accent-red); color:var(--accent-red); }
  .label-btn.unsure { background:var(--accent-gold-bg); border-color:var(--accent-gold); color:var(--accent-gold); }
  .label-btn.skip { background:var(--parchment-light); border-color:var(--warm-gray-light); color:var(--warm-gray); }
  .label-btn:hover { transform:translateY(-1px); }
  .label-btn.true_pos.selected { background:var(--accent-green); color:var(--parchment-light); }
  .label-btn.false_pos.selected { background:var(--accent-red); color:var(--parchment-light); }
  .label-btn.unsure.selected { background:var(--accent-gold); color:var(--parchment-light); }
  .label-btn.skip.selected { background:var(--warm-gray); color:var(--parchment-light); border-color:var(--warm-gray); }
  .note-input { width:100%; min-height:64px; padding:10px 14px;
                background:var(--parchment-light); border:1px solid var(--rule-color); color:var(--charcoal);
                border-radius:2px; font-family:var(--font-cn); font-size:13px; resize:vertical;
                margin-bottom:18px; line-height:1.6; }
  .note-input:focus { outline:none; border-color:var(--ink-blue); }

  /* Snippet table — almost a printed page */
  .snippet { background:var(--parchment-light); border:1px solid var(--rule-color); border-radius:2px;
             overflow:hidden; }
  .snippet-row { display:grid; grid-template-columns:54px 140px 90px 1fr;
                 gap:0; padding:9px 14px; border-bottom:1px solid var(--rule-color);
                 font-size:12px; align-items:start; }
  .snippet-row:last-child { border-bottom:none; }
  .snippet-row.dl { background:var(--accent-gold-bg); border-left:3px solid var(--accent-gold); }
  .snippet-row.null-row { background:var(--accent-red-bg); border-left:3px solid var(--accent-red); }
  .snippet-row.last-edit { background:var(--accent-green-bg); border-left:3px solid var(--accent-green); }
  .sr-idx { color:var(--warm-gray-light); font-family:var(--font-mono); font-weight:600; font-size:11px; }
  .sr-action { font-family:var(--font-mono); font-weight:600; color:var(--ink-blue); font-size:11.5px; }
  .sr-time { color:var(--warm-gray-light); font-family:var(--font-mono); font-size:10.5px; }
  .sr-body { color:var(--charcoal); word-break:break-word; }
  .sr-payload { font-family:var(--font-mono); font-size:11.5px; color:var(--charcoal); margin-bottom:3px; line-height:1.5; }
  .sr-obs { color:var(--warm-gray); font-size:11px; line-height:1.5; }
  .sr-obs.err { color:var(--accent-red); }
  .sr-thought { color:var(--ink-blue-light); font-size:11px; font-style:italic; margin-top:4px;
                padding-top:4px; border-top:1px dashed var(--rule-color); }
  .sr-response { color:var(--accent-red); font-size:11px; font-family:var(--font-mono);
                 margin-top:5px; padding:6px 9px; background:var(--accent-red-bg);
                 border-left:2px solid var(--accent-red); border-radius:0;
                 max-height:120px; overflow-y:auto; line-height:1.5; }

  /* Eval timeline (M93) */
  .eval-timeline { background:var(--parchment-light); border:1px solid var(--rule-color); border-radius:2px;
                   padding:14px 18px; margin-bottom:14px; }
  .eval-timeline-title { font-size:10.5px; color:var(--ink-blue); text-transform:uppercase;
                         letter-spacing:0.12em; margin-bottom:10px; font-weight:700; font-family:var(--font-en); }
  .eval-points { display:flex; gap:8px; flex-wrap:wrap; }
  .eval-point { padding:6px 11px; background:var(--parchment); border:1px solid var(--rule-color);
                border-radius:2px; font-size:11.5px; font-family:var(--font-mono);
                color:var(--charcoal); }
  .eval-point.first { border-color:var(--ink-blue-light); color:var(--ink-blue); }
  .eval-point.last { border-color:var(--ink-blue); color:var(--ink-blue); font-weight:600; }
  .eval-point strong { color:var(--ink-blue); font-weight:700; }

  .empty { padding:80px; text-align:center; color:var(--warm-gray-light); font-family:var(--font-cn);
           font-size:14px; }
  details { background:var(--parchment); border:1px solid var(--rule-color); border-radius:2px;
            padding:8px 12px; margin-top:8px; }
  details summary { cursor:pointer; color:var(--warm-gray); font-size:11px;
                    font-family:var(--font-en); letter-spacing:0.04em; }
  details pre { background:var(--parchment-light); padding:10px; margin-top:8px; border-radius:2px;
                color:var(--charcoal); font-size:10.5px; overflow-x:auto; max-height:280px;
                font-family:var(--font-mono); border:1px solid var(--rule-color); }

  kbd { padding:2px 7px; background:var(--parchment-light); border:1px solid var(--rule-color);
        border-bottom-width:2px; border-radius:2px; font-family:var(--font-mono); font-size:10.5px;
        color:var(--ink-blue); font-weight:600; }

  /* Filters */
  .filter-row { display:flex; gap:0; padding:0; border-bottom:1px solid var(--rule-color);
                background:var(--parchment); }
  .filter-btn { flex:1; padding:8px 8px; background:transparent; border:none;
                border-right:1px solid var(--rule-color);
                cursor:pointer; color:var(--warm-gray); font-size:11.5px; font-weight:600;
                font-family:var(--font-en); letter-spacing:0.05em; }
  .filter-btn:last-child { border-right:none; }
  .filter-btn:hover { color:var(--ink-blue); }
  .filter-btn.active { background:var(--ink-blue); color:var(--parchment-light); }

  /* Custom scrollbars to match parchment */
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:var(--parchment); }
  ::-webkit-scrollbar-thumb { background:var(--parchment-dark); border-radius:0;
                              border:2px solid var(--parchment); }
  ::-webkit-scrollbar-thumb:hover { background:var(--warm-gray-light); }
</style>
</head>
<body>

<div class="topbar">
  <h1>M-Metric 标注</h1>
  <div class="metric-tabs" id="metric-tabs"></div>
  <div class="progress" id="progress">—</div>
  <div class="actions">
    <button class="btn" onclick="exportCSV()">导出 CSV</button>
    <button class="btn" onclick="exportJSON()">导出 JSON</button>
    <button class="btn" onclick="importJSON()">导入</button>
    <button class="btn" onclick="if(confirm('清空当前 metric 的所有标注？'))resetCurrent()">清空</button>
  </div>
</div>
<div style="background:var(--ink-blue-faint);border-bottom:1px solid var(--rule-color);padding:11px 28px;font-size:13px;color:var(--charcoal);font-family:var(--font-cn);line-height:1.7;">
  <strong style="color:var(--ink-blue);">怎么标：</strong>每条轨迹，指标已经做了一个判定。你看完轨迹回答<strong style="color:var(--ink-blue);">"指标这次判得对吗"</strong>。判得对按 <kbd>1</kbd>，判得错按 <kbd>2</kbd>，看不清按 <kbd>3</kbd>，数据有问题按 <kbd>4</kbd>。
  <strong style="color:var(--ink-blue);margin-left:14px;">建议顺序：</strong>
  M57（最容易）→ M14 → M93 → M21。
</div>

<div class="layout">
  <div class="sidebar">
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="unlabeled">未标</button>
      <button class="filter-btn" data-filter="labeled">已标</button>
    </div>
    <div id="sidebar-list"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">从左侧选择一条轨迹开始标注</div>
  </div>
</div>

<script>
// ============================================================
// Data: snippets are inlined below (one big object keyed by metric)
// ============================================================
let DATA = window.SNIPPETS || {};
const METRICS = ['M14', 'M21', 'M93', 'M57'];

const QUESTIONS = {
  M14: {
    title: '【M14 死锁】',
    label: '指标说"这条死锁了"——判得对吗？',
    body: `<strong>看黄色高亮窗口前一步在干嘛。</strong><br>
           前面启动了训练 / 数据生成 / 长任务 → polling 是合理等待 → <strong style="color:var(--bad)">指标判错了（按 2）</strong><br>
           前面没启动什么长任务，纯瞎打几个命令就开始 polling → 真死锁 → <strong style="color:var(--good)">指标判对了（按 1）</strong><br>
           看不出来 → 按 3。`,
  },
  M21: {
    title: '【M21 格式失败】',
    label: '指标说"这些 NullAction 是模型输出格式坏了"——判得对吗？',
    body: `<strong>看红色行下面的 🔬 诊断。</strong><br>
           诊断显示 MODEL_OUTPUT_TEXT 是垃圾文字 / 空白 / 不完整 JSON / 被截断 → 真格式坏 → <strong style="color:var(--good)">指标判对了（按 1）</strong><br>
           诊断显示 FRAMEWORK_ERROR 报参数名不对 / MODEL_TRIED_TO_CALL 是合法工具但框架不认（如 finish）→ 模型其实输出合法，是框架问题 → <strong style="color:var(--bad)">指标判错了（按 2）</strong><br>
           诊断不全 → 按 3。`,
  },
  M93: {
    title: '【M93 重试改善】',
    label: '指标看分数判断"agent 有没有改善" —— 判得对吗？',
    body: `<strong>看顶部的 score_delta 和首末几步。</strong><br>
           <strong>M93=1（指标说"有改善"）：</strong>delta 较大 + 末尾有真实修复动作 → <strong style="color:var(--good)">指标判对了（按 1）</strong>。delta 极小（0.几）或只是 eval 抖动 / 不同子任务分别 eval / 第一次 eval 是垃圾分 → <strong style="color:var(--bad)">指标判错了（按 2）</strong>。<br>
           <strong>M93=0（指标说"没改善"）：</strong>agent 确实在原地踏步或退步 → <strong style="color:var(--good)">指标判对了（按 1）</strong>。第一次就满分（无改善空间）或只 eval 了一次 → <strong style="color:var(--bad)">指标判错了（按 2）</strong>。`,
  },
  M57: {
    title: '【M57 修复后验证】',
    label: '指标说"最后 edit 之后有没有验证" —— 判得对吗？',
    body: `<strong>口诀：看绿色高亮（最后一次 edit）下面那几行的 action_type 列里有没有 <code>run_command</code> 或 <code>eval</code>。</strong><br>
           <strong>M57=0（指标说"盲提交，没验证"）：</strong>实际下面没 run_command/eval（只有 summarize / finish / null）→ <strong style="color:var(--good)">指标判对了（按 1）</strong>。实际下面有 run_command/eval → <strong style="color:var(--bad)">指标判错了（按 2）</strong>。<br>
           <strong>M57=1（指标说"已验证"）：</strong>实际下面有 run_command/eval → <strong style="color:var(--good)">指标判对了（按 1）</strong>。实际下面没 run_command/eval → <strong style="color:var(--bad)">指标判错了（按 2）</strong>。<br>
           不用判断那命令"算不算真验证"，只看 action_type 列有没有出现这俩词。`,
  },
};

let CUR_METRIC = 'M57';
let CUR_IDX = -1;
let FILTER = 'all';

// ============================================================
// localStorage
// ============================================================
const STORAGE_KEY = 'm-metric-labels-v1';
function loadLabels() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveLabels(L) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(L));
}
function getLabel(metric, traj) {
  const L = loadLabels();
  return (L[metric] && L[metric][traj]) || null;
}
function setLabel(metric, traj, label, note) {
  const L = loadLabels();
  if (!L[metric]) L[metric] = {};
  L[metric][traj] = { label, note: note||'', at: new Date().toISOString() };
  saveLabels(L);
}

// ============================================================
// Render
// ============================================================
function renderTabs() {
  const tabs = document.getElementById('metric-tabs');
  tabs.innerHTML = METRICS.map(m => {
    const total = (DATA[m] || []).length;
    const labeled = countLabeled(m);
    return `<div class="metric-tab ${m===CUR_METRIC?'active':''}" data-metric="${m}">
              ${m} <span class="count">${labeled}/${total}</span>
            </div>`;
  }).join('');
  tabs.querySelectorAll('.metric-tab').forEach(el => {
    el.onclick = () => { CUR_METRIC = el.dataset.metric; CUR_IDX = -1; renderAll(); };
  });
}
function countLabeled(metric) {
  const L = loadLabels()[metric] || {};
  return (DATA[metric] || []).filter(s => L[s.trajectory_dir]).length;
}
function renderProgress() {
  const total = (DATA[CUR_METRIC] || []).length;
  const labeled = countLabeled(CUR_METRIC);
  const L = loadLabels()[CUR_METRIC] || {};
  const tp = Object.values(L).filter(x=>x.label==='true_pos').length;
  const fp = Object.values(L).filter(x=>x.label==='false_pos').length;
  const us = Object.values(L).filter(x=>x.label==='unsure').length;
  const sk = Object.values(L).filter(x=>x.label==='skipped').length;
  document.getElementById('progress').innerHTML =
    `${CUR_METRIC}: <strong>${labeled}/${total}</strong> · 判对 <strong style="color:var(--good)">${tp}</strong> · 判错 <strong style="color:var(--bad)">${fp}</strong> · 看不清 <strong style="color:var(--warn)">${us}</strong> · 跳过 ${sk}` +
    (labeled - sk > 0 ? ` · <strong>指标准确率 ${((tp/(tp+fp+us||1))*100).toFixed(1)}%</strong>` : '');
}
function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  const arr = DATA[CUR_METRIC] || [];
  const L = loadLabels()[CUR_METRIC] || {};
  const items = arr.map((s,i) => {
    const lab = L[s.trajectory_dir];
    if (FILTER === 'unlabeled' && lab) return '';
    if (FILTER === 'labeled' && !lab) return '';
    const status = lab ? `<span class="si-status ${lab.label}">${labelShort(lab.label)}</span>` : '';
    const trajShort = s.trajectory_dir.replace(/^workspace_task_/, 'T').slice(0, 38);
    let metaLine = `task ${s.task_id} · ${(s.model||'').slice(0,18)}`;
    if (CUR_METRIC === 'M14') metaLine += ` · run=${s.deadlock_run?.length||'?'}`;
    if (CUR_METRIC === 'M21') metaLine += ` · null=${s.n_null_total||0}`;
    if (CUR_METRIC === 'M93') metaLine += ` · Δ=${(s.M93_score_delta||0).toFixed?.(2)||s.M93_score_delta}`;
    if (CUR_METRIC === 'M57') metaLine += ` · tail=${s.tail_len||0}`;
    return `<div class="sidebar-item ${i===CUR_IDX?'active':''}" data-idx="${i}">
              ${status}
              <div class="si-id">#${i+1}</div>
              <div class="si-title">${trajShort}</div>
              <div class="si-meta">${metaLine}</div>
            </div>`;
  }).join('');
  list.innerHTML = items || '<div class="empty">无符合条件项</div>';
  list.querySelectorAll('.sidebar-item').forEach(el => {
    el.onclick = () => { CUR_IDX = parseInt(el.dataset.idx); renderMain(); renderSidebar(); };
  });
}
function labelShort(label) {
  return {true_pos:'对', false_pos:'错', unsure:'?', skipped:'—'}[label] || label;
}
function renderMain() {
  const main = document.getElementById('main');
  const arr = DATA[CUR_METRIC] || [];
  if (CUR_IDX < 0 || CUR_IDX >= arr.length) {
    main.innerHTML = `<div class="empty">从左侧选择一条轨迹开始标注（共 ${arr.length} 条）</div>`;
    return;
  }
  const s = arr[CUR_IDX];
  const Q = QUESTIONS[CUR_METRIC];
  const cur = getLabel(CUR_METRIC, s.trajectory_dir);

  let evalHTML = '';
  if (CUR_METRIC === 'M93') {
    const tl = s.eval_timeline || [];
    evalHTML = `<div class="eval-timeline">
      <div class="eval-timeline-title">📊 Eval 信号</div>
      <div class="eval-points">
        <div class="eval-point first">M93_retry_improved = <strong>${s.M93_retry_improved}</strong></div>
        <div class="eval-point first">score_delta = <strong>${s.M93_score_delta}</strong></div>
        <div class="eval-point first">M24_num_evals = <strong>${s.M24_num_evals||'?'}</strong></div>
        <div class="eval-point last">best_eval_score = <strong>${s.M24_best_eval_score}</strong></div>
        ${tl.length ? `<div class="eval-point">timeline 提取到 ${tl.length} 个分数点</div>` : '<div class="eval-point" style="color:var(--muted)">timeline 未提取，看 score_delta + 末尾 eval 节点</div>'}
      </div>
    </div>`;
  }
  if (CUR_METRIC === 'M14') {
    evalHTML = `<div class="eval-timeline">
      <div class="eval-timeline-title">⚠️  死锁判定</div>
      <div class="eval-points">
        <div class="eval-point">deadlock_run.length = <strong>${s.deadlock_run?.length}</strong></div>
        <div class="eval-point">M14 = <strong>${(s.M14_deadlock_step_ratio||0).toFixed?.(3)||s.M14_deadlock_step_ratio}</strong></div>
        <div class="eval-point">n_react = ${s.n_react}</div>
        <div class="eval-point">起止 idx: ${s.deadlock_run?.start_idx}–${s.deadlock_run?.end_idx}</div>
      </div>
    </div>`;
  }
  if (CUR_METRIC === 'M21') {
    evalHTML = `<div class="eval-timeline">
      <div class="eval-timeline-title">📛 NullAction 判定</div>
      <div class="eval-points">
        <div class="eval-point">M21 = <strong>${(s.M21_format_fail_rate*100).toFixed(1)}%</strong></div>
        <div class="eval-point">n_null = <strong>${s.n_null_total}</strong> / n_react = ${s.n_react}</div>
      </div>
    </div>`;
  }
  if (CUR_METRIC === 'M57') {
    evalHTML = `<div class="eval-timeline">
      <div class="eval-timeline-title">${s.M57_post_fix_verify==1?'✅ 已验证':'❌ 盲提交'}</div>
      <div class="eval-points">
        <div class="eval-point">M57 = <strong>${s.M57_post_fix_verify}</strong></div>
        <div class="eval-point">last_edit_idx = ${s.last_edit_idx}</div>
        <div class="eval-point">tail_len = ${s.tail_len}</div>
        <div class="eval-point">n_edit_file = ${s.AUX_n_edit_file||'?'}</div>
        <div class="eval-point">n_eval = ${s.AUX_n_eval||'?'}</div>
      </div>
    </div>`;
  }

  const snipHTML = (s.snippet || []).map(row => {
    const cls = [];
    if (row._in_deadlock) cls.push('dl');
    if (row._is_null) cls.push('null-row');
    if (row._is_last_edit) cls.push('last-edit');
    let body = '';
    if (row.payload) body += `<div class="sr-payload">${escapeHTML(row.payload)}</div>`;
    if (row.obs) {
      const isErr = row.obs.startsWith('ERR') || row.obs === 'FAILED';
      body += `<div class="sr-obs ${isErr?'err':''}">${escapeHTML(row.obs)}</div>`;
    }
    if (row.thought) body += `<div class="sr-thought">💭 ${escapeHTML(row.thought)}</div>`;
    if (row.null_diag) body += `<div class="sr-response">🔬 ${escapeHTML(row.null_diag)}</div>`;
    if (row._response_raw) body += `<div class="sr-response">RAW: ${escapeHTML(row._response_raw)}</div>`;
    return `<div class="snippet-row ${cls.join(' ')}">
      <div class="sr-idx">#${row._idx}</div>
      <div class="sr-action">${escapeHTML(row.action_type||'<null>')}</div>
      <div class="sr-time">${(row.timestamp||'').slice(11,19)}</div>
      <div class="sr-body">${body || '<span style="color:var(--muted)">—</span>'}</div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="header-row">
      <h2>${escapeHTML(s.trajectory_dir)}</h2>
      <div class="meta-pills">
        <span class="pill">task <strong>${s.task_id}</strong></span>
        <span class="pill">model <strong>${escapeHTML(s.model||'?')}</strong></span>
        <span class="pill score">final <strong>${s.M24_best_eval_score?.toFixed?.(2)||s.M24_best_eval_score||0}</strong></span>
        <span class="pill">band <strong>${s._band||'-'}</strong></span>
      </div>
    </div>
    <div class="question-card">
      <div class="q-label">${Q.title} ${Q.label}</div>
      <div class="q-text">${Q.body}</div>
    </div>
    ${evalHTML}
    <div class="label-buttons">
      <button class="label-btn true_pos ${cur?.label==='true_pos'?'selected':''}" onclick="setCur('true_pos')">✓ 指标判对了 (1)</button>
      <button class="label-btn false_pos ${cur?.label==='false_pos'?'selected':''}" onclick="setCur('false_pos')">✗ 指标判错了 (2)</button>
      <button class="label-btn unsure ${cur?.label==='unsure'?'selected':''}" onclick="setCur('unsure')">? 看不清 (3)</button>
      <button class="label-btn skip ${cur?.label==='skipped'?'selected':''}" onclick="setCur('skipped')">— 跳过 (4)</button>
      <span style="margin-left:auto;color:var(--muted);font-size:11px;align-self:center;">
        快捷键 <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> · 上下条 <kbd>↑</kbd> <kbd>↓</kbd> · 标完跳下一条 <kbd>n</kbd>
      </span>
    </div>
    <textarea class="note-input" id="note" placeholder="可选备注：为什么是真/假阳？看到了什么关键证据？">${escapeHTML(cur?.note||'')}</textarea>
    <div class="snippet">${snipHTML}</div>
    <details><summary>原始 sample JSON</summary><pre>${escapeHTML(JSON.stringify(s, null, 2))}</pre></details>
  `;
  document.getElementById('note').addEventListener('blur', () => {
    const n = document.getElementById('note').value;
    if (cur) setLabel(CUR_METRIC, s.trajectory_dir, cur.label, n);
  });
}
function setCur(label) {
  const arr = DATA[CUR_METRIC] || [];
  if (CUR_IDX < 0) return;
  const s = arr[CUR_IDX];
  const note = document.getElementById('note')?.value || '';
  setLabel(CUR_METRIC, s.trajectory_dir, label, note);
  renderAll();
}
function nextItem() {
  const arr = DATA[CUR_METRIC] || [];
  // Find next unlabeled
  const L = loadLabels()[CUR_METRIC] || {};
  for (let i = CUR_IDX+1; i < arr.length; i++) {
    if (!L[arr[i].trajectory_dir]) { CUR_IDX = i; renderAll(); return; }
  }
  // wrap or just go +1
  if (CUR_IDX+1 < arr.length) { CUR_IDX++; renderAll(); }
}
function escapeHTML(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderAll() {
  renderTabs();
  renderProgress();
  renderSidebar();
  renderMain();
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  const arr = DATA[CUR_METRIC] || [];
  if (e.key === '1') { setCur('true_pos'); }
  else if (e.key === '2') { setCur('false_pos'); }
  else if (e.key === '3') { setCur('unsure'); }
  else if (e.key === '4') { setCur('skipped'); }
  else if (e.key === 'n') { nextItem(); }
  else if (e.key === 'ArrowDown') { if (CUR_IDX+1 < arr.length) { CUR_IDX++; renderAll(); }}
  else if (e.key === 'ArrowUp') { if (CUR_IDX > 0) { CUR_IDX--; renderAll(); }}
});

document.querySelectorAll('.filter-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); FILTER = b.dataset.filter; renderSidebar();
  };
});

function exportCSV() {
  const L = loadLabels();
  const rows = [['metric','trajectory_dir','task_id','model','band','metric_value','label','note','at']];
  for (const m of METRICS) {
    for (const s of (DATA[m]||[])) {
      const lab = (L[m]||{})[s.trajectory_dir];
      if (!lab) continue;
      const mv = (m==='M14'?s.M14_deadlock_step_ratio:m==='M21'?s.M21_format_fail_rate:m==='M93'?s.M93_score_delta:s.M57_post_fix_verify);
      rows.push([m, s.trajectory_dir, s.task_id, s.model, s._band, mv, lab.label, lab.note?.replace(/[\r\n]+/g,' ')||'', lab.at]);
    }
  }
  const csv = rows.map(r => r.map(x => `"${String(x||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `m-metric-labels-${new Date().toISOString().slice(0,16).replace(/[:T]/g,'-')}.csv`;
  a.click();
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(loadLabels(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `m-metric-labels-${new Date().toISOString().slice(0,16).replace(/[:T]/g,'-')}.json`;
  a.click();
}
function importJSON() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (confirm(`导入 ${Object.keys(data).length} 个 metric 的标注？现有标注会被合并覆盖。`)) {
          const cur = loadLabels();
          for (const m of Object.keys(data)) {
            if (!cur[m]) cur[m] = {};
            Object.assign(cur[m], data[m]);
          }
          saveLabels(cur);
          renderAll();
        }
      } catch (e) { alert('解析失败: ' + e.message); }
    };
    reader.readAsText(f);
  };
  inp.click();
}
function resetCurrent() {
  const L = loadLabels();
  delete L[CUR_METRIC];
  saveLabels(L);
  renderAll();
}

// Boot
if (Object.keys(DATA).length === 0) {
  document.getElementById('main').innerHTML =
    `<div class="empty">⚠️ 数据未加载。检查 snippets-data.js 是否在 HTML 旁边并被引用。</div>`;
} else {
  renderAll();
}
</script>
<script src="snippets-data.js"></script>
<script>
  // re-init after the data script loads
  if (window.SNIPPETS) { DATA = window.SNIPPETS; renderAll(); }
</script>
</body>
</html>
